
<style>
  :root {
    --color-background-primary: #121212;
    --color-background-secondary: #1e1e1e;
    --color-background-tertiary: #2d2d2d;
    --color-border-tertiary: #333333;
    --color-border-secondary: #444444;
    --color-text-primary: #e0e0e0;
    --color-text-secondary: #b0b0b0;
    --color-text-tertiary: #888888;
    --border-radius-lg: 8px;
  }

  body {
    background-color: var(--color-background-primary);
    margin: 0;
    font-family: system-ui, -apple-system, sans-serif;
  }

  .wrap { 
    padding: 1.5rem; 
    background-color: var(--color-background-primary); 
    max-width: 900px;
    margin: 0 auto;
  }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 16px; margin-bottom: 20px; padding: 0 4px; }
  .legend span { font-size: 12px; display: flex; align-items: center; gap: 8px; color: var(--color-text-secondary); }
  .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  
  /* Colores de la leyenda vinculados a los badges */
  .d-core { background: #d1caff; }
  .d-comp { background: #a7f3d0; }
  .d-arch { background: #fbbf24; }
  .d-ext  { background: #ffedd5; }

  /* Card container */
  .cap { 
    border: 0.5px solid var(--color-border-tertiary); 
    border-radius: var(--border-radius-lg); 
    margin-bottom: 12px; 
    overflow: hidden; 
    background: var(--color-background-secondary);
    transition: border-color 0.2s;
  }
  .cap:hover { border-color: var(--color-border-secondary); }

  .cap-header { 
    display: flex; 
    align-items: center; 
    gap: 12px; 
    padding: 14px 16px; 
    cursor: pointer; 
    user-select: none; 
  }
  .cap-header:hover { background: var(--color-background-tertiary); }

  /* Badges - Tema Oscuro */
  .badge { 
    font-size: 11px; 
    font-weight: 600; 
    padding: 2px 10px; 
    border-radius: 20px; 
    white-space: nowrap; 
    flex-shrink: 0; 
    border: 1px solid rgba(255,255,255,0.05);
  }
  .b-core { background: #2a245d; color: #d1caff; }
  .b-comp { background: #063b2f; color: #a7f3d0; }
  .b-arch { background: #4a2b05; color: #fbbf24; }
  .b-ext  { background: #5d2512; color: #ffedd5; }

  .cap-num { font-size: 12px; color: var(--color-text-tertiary); min-width: 45px; font-family: monospace; }
  .cap-title { font-size: 15px; font-weight: 500; color: var(--color-text-primary); flex: 1; }
  
  .cap-body { 
    padding: 0 16px 14px 57px; /* Alineado con el inicio del texto del título */
    display: none; 
    border-top: 0.5px solid var(--color-border-tertiary); 
  }
  .cap-body.open { display: block; }
  .cap-body p { font-size: 13px; color: var(--color-text-secondary); line-height: 1.6; margin: 12px 0; }

  /* Chips y Tags */
  .tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 12px 0 4px; }
  .semana-chip { 
    font-size: 11px; 
    background: var(--color-background-tertiary); 
    color: var(--color-text-primary); 
    border: 0.5px solid var(--color-border-secondary); 
    border-radius: 4px; 
    padding: 2px 8px; 
  }
  .tag { 
    font-size: 11px; 
    padding: 2px 8px; 
    border-radius: 4px; 
    background: rgba(255,255,255,0.03); 
    color: var(--color-text-tertiary); 
    border: 0.5px solid var(--color-border-tertiary);
  }

  .rel { font-size: 12px; color: var(--color-text-tertiary); border-top: 1px solid var(--color-border-tertiary); pt: 8px; margin-top: 12px; padding-top: 12px; }
  .rel strong { color: var(--color-text-secondary); font-weight: 600; }
  
  .chev { margin-left: auto; color: var(--color-text-tertiary); font-size: 12px; transition: transform 0.2s; }
</style>

<div class="wrap">

    <span><span class="dot d-arch"></span> Arquitectura</span>
    <span><span class="dot d-ext"></span> Extensión GoF</span>
  </div>

</div>

function build() {
  const el = document.getElementById('caps');
  caps.forEach((c, i) => {
    const div = document.createElement('div');
    div.className = 'cap';
    div.innerHTML = `
      <div class="cap-header" onclick="toggle(${i})">
        <span class="cap-num">${c.num}</span>
        <span class="cap-title">${c.title}</span>
        <span class="badge ${c.badge}">${c.bl}</span>
        <span class="chev" id="chev-${i}">▸</span>
      </div>
      <div class="cap-body" id="body-${i}">
        <p>${c.desc}</p>
        <p><strong style="color:var(--color-text-secondary)">Unidad del programa:</strong> ${c.unidad}</p>
        <p class="rel"><strong>Relación con otros caps.:</strong> ${c.relacionados}</p>
        <div class="tag-row">
          ${c.semanas.map(s=>`<span class="semana-chip">${s}</span>`).join('')}
          ${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}
        </div>
      </div>
    `;
    el.appendChild(div);
  });
}

function toggle(i) {
  const b = document.getElementById('body-'+i);
  const ch = document.getElementById('chev-'+i);
  const open = b.classList.toggle('open');
  ch.textContent = open ? '▾' : '▸';
}

build();
